# Main background, empty for terminal default, need to be empty if you want transparent background
theme[main_bg]="#0e1521"

# Main text color
theme[main_fg]="#c2c4c7"

# Title color for boxes
theme[title]="#c2c4c7"

# Highlight color for keyboard shortcuts
theme[hi_fg]="#433C42"

# Background color of selected item in processes box
theme[selected_bg]="#88613C"

# Foreground color of selected item in processes box
theme[selected_fg]="#c2c4c7"

# Color of inactive/disabled text
theme[inactive_fg]="#44475a"

# Color of text appearing on top of graphs, i.e uptime and current network graph scaling
theme[graph_text]="#c2c4c7"

# Background color of the percentage meters
theme[meter_bg]="#44475a"

# Misc colors for processes box including mini cpu graphs, details memory graph and details status text
theme[proc_misc]="#C8A171"

# Cpu box outline color
theme[cpu_box]="#C8A171"

# Memory/disks box outline color
theme[mem_box]="#C8A171"

# Net up/down box outline color
theme[net_box]="#C8A171"

# Processes box outline color
theme[proc_box]="#C8A171"

# Box divider line and small boxes line color
theme[div_line]="#44475a"

# Temperature graph colors
theme[temp_start]="#88613C"
theme[temp_mid]="#8D7257"
theme[temp_end]="#A48C6D"

# CPU graph colors
theme[cpu_start]="#88613C"
theme[cpu_mid]="#8D7257"
theme[cpu_end]="#A48C6D"

# Mem/Disk free meter
theme[free_start]="#88613C"
theme[free_mid]="#8D7257"
theme[free_end]="#A48C6D"

# Mem/Disk cached meter
theme[cached_start]="#88613C"
theme[cached_mid]="#8D7257"
theme[cached_end]="#A48C6D"

# Mem/Disk available meter
theme[available_start]="#88613C"
theme[available_mid]="#8D7257"
theme[available_end]="#A48C6D"

# Mem/Disk used meter
theme[used_start]="#88613C"
theme[used_mid]="#8D7257"
theme[used_end]="#A48C6D"

# Download graph colors
theme[download_start]="#88613C"
theme[download_mid]="#8D7257"
theme[download_end]="#A48C6D"

# Upload graph colors
theme[upload_start]="#88613C"
theme[upload_mid]="#8D7257"
theme[upload_end]="#A48C6D"

# Process box color gradient for threads, mem and cpu usage
theme[process_start]="#88613C"
theme[process_mid]="#8D7257"
theme[process_end]="#A48C6D"
