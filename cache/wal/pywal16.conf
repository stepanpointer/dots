# Main background, empty for terminal default, need to be empty if you want transparent background
theme[main_bg]="#wal"

# Main text color
theme[main_fg]="#c2c3c6"

# Title color for boxes
theme[title]="#c2c3c6"

# Highlight color for keyboard shortcuts
theme[hi_fg]="#5D4735"

# Background color of selected item in processes box
theme[selected_bg]="#3C4346"

# Foreground color of selected item in processes box
theme[selected_fg]="#c2c3c6"

# Color of inactive/disabled text
theme[inactive_fg]="#44475a"

# Color of text appearing on top of graphs, i.e uptime and current network graph scaling
theme[graph_text]="#c2c3c6"

# Background color of the percentage meters
theme[meter_bg]="#44475a"

# Misc colors for processes box including mini cpu graphs, details memory graph and details status text
theme[proc_misc]="#A58873"

# Cpu box outline color
theme[cpu_box]="#A58873"

# Memory/disks box outline color
theme[mem_box]="#A58873"

# Net up/down box outline color
theme[net_box]="#A58873"

# Processes box outline color
theme[proc_box]="#A58873"

# Box divider line and small boxes line color
theme[div_line]="#44475a"

# Temperature graph colors
theme[temp_start]="#3C4346"
theme[temp_mid]="#5A5652"
theme[temp_end]="#916B54"

# CPU graph colors
theme[cpu_start]="#3C4346"
theme[cpu_mid]="#5A5652"
theme[cpu_end]="#916B54"

# Mem/Disk free meter
theme[free_start]="#3C4346"
theme[free_mid]="#5A5652"
theme[free_end]="#916B54"

# Mem/Disk cached meter
theme[cached_start]="#3C4346"
theme[cached_mid]="#5A5652"
theme[cached_end]="#916B54"

# Mem/Disk available meter
theme[available_start]="#3C4346"
theme[available_mid]="#5A5652"
theme[available_end]="#916B54"

# Mem/Disk used meter
theme[used_start]="#3C4346"
theme[used_mid]="#5A5652"
theme[used_end]="#916B54"

# Download graph colors
theme[download_start]="#3C4346"
theme[download_mid]="#5A5652"
theme[download_end]="#916B54"

# Upload graph colors
theme[upload_start]="#3C4346"
theme[upload_mid]="#5A5652"
theme[upload_end]="#916B54"

# Process box color gradient for threads, mem and cpu usage
theme[process_start]="#3C4346"
theme[process_mid]="#5A5652"
theme[process_end]="#916B54"
